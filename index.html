<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Literoom</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            color: #000;
            margin: 20px;
        }

        .container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .preview {
            max-width: 400px;
            max-height: 400px;
            height: auto;
            width: auto;
            border: 1px solid #ccc;
        }

        canvas {
            border: 1px solid #ccc;
            max-width: 400px;
            height: auto;
        }

        .slider-group {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 12px;
            width: 280px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
        }

        .slider-row label {
            width: 90px;
            font-size: 12px;
        }

        .slider-row span {
            width: 40px;
            text-align: right;
            font-size: 12px;
            font-family: monospace;
        }

        input[type=range] {
            flex: 1;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        button {
            margin-top: 10px;
            padding: 6px 12px;
        }
    </style>
</head>

<body>

    <h2>Literoom</h2>
    <input type="file" id="upload"><br><br>

    <div class="container">

        <div>
            Before<br>
            <img id="inputImg" class="preview">
            <canvas id="histBefore" width="256" height="100"></canvas>
        </div>

        <div>
            After<br>
            <canvas id="outputCanvas"></canvas>
            <canvas id="histAfter" width="256" height="100"></canvas>
            <br>
            <button id="saveBtn">Save Image</button>
        </div>

        <div id="controls"></div>

    </div>

    <div id="loading">Processing...</div>

    <script src="app.js"></script>
</body>

</html>
